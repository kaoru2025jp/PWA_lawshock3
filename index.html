<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stock1 計算（完成版）</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
input, button {
  margin: 6px 0;
  width: 100%;
  max-width: 320px;
  padding: 6px;
  font-size: 16px;
}
button {
  cursor: pointer;
}
</style>
</head>
<body>

<h2>stock1 計算（完成版）</h2>

B: <input id="B" type="number" step="any"><br>
V: <input id="V" type="number" step="any"><br>
O: <input id="O" type="number" step="any"><br>
r: <input id="r" type="number" step="any"><br>
T1: <input id="T1" type="number" step="any"><br>
T2: <input id="T2" type="number" step="any"><br>

<button onclick="calc()">計算して送信</button>

<h3>結果</h3>
M: <span id="M"></span><br>
OX: <span id="OX"></span>

<script>

// ★Apps Script URL（そのまま使う）
const GAS_URL = "https://script.google.com/macros/s/AKfycbxbkA5GahpmrKohmd-WZfAR6NmvvqqnMcv18Wh5p0eioxgpicIlj5TCozH8R17xBpchhQ/exec";

function calc() {

  const B  = parseFloat(document.getElementById("B").value) || 0;
  const V  = parseFloat(document.getElementById("V").value) || 0;
  const O  = parseFloat(document.getElementById("O").value) || 0;
  const r  = parseFloat(document.getElementById("r").value) || 0;
  const T1 = parseFloat(document.getElementById("T1").value) || 0;
  const T2 = parseFloat(document.getElementById("T2").value) || 1;

  // ===== 計算 =====
  const denominator = V * Math.exp(-r * T1);

  let M = 0;
  if (denominator !== 0) {
    M = (B * V - O) / denominator;
  }

  let OX = 0;
  if (T2 !== 0) {
    OX = (B - M) / T2;
  }

  // ===== 表示 =====
  document.getElementById("M").textContent = M.toFixed(4);
  document.getElementById("OX").textContent = OX.toFixed(4);

  // ===== 送信（成功例と同じ形式）=====
  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(res) {
    console.log("送信成功", res);
    delete window[callbackName];
  };

  const script = document.createElement("script");

  script.src =
    GAS_URL +
    "?numbers=" + encodeURIComponent(OX.toFixed(4)) +
    "&callback=" + callbackName;

  document.body.appendChild(script);
}

</script>

</body>
</html>
